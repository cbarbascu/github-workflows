on:
  workflow_dispatch:
    inputs:
      message:
        description: 'The message to echo'
        required: false
        default: 'Hello, world!'
  push:   
jobs:
  build:
    name: First-Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Run a one-line script
        shell: bash
        run: echo Hello, world!
      - name: Run a multi-line script
        shell: bash
        run: |
          echo Add other actions to build,
          echo test, and deploy your project. 
      - name: Run existing script
        shell: bash
        id: run_script
        run: |
          chmod +x ./myscript.sh 
          ./myscript.sh 
          echo "result=Success" >> $GITHUB_OUTPUT
          
      - name: Use an action defined in this repository
        uses: ./.github/actions/echo
        id: echo_step
        # uses: cbarbascu/github-workflows/.github/actions/echo
        with:
          message: 'Hello from the custom action!'
      - name: Use the echoed message
        shell: bash
        run: | 
          echo "The echoed message is: ${{ steps.echo_step.outputs.echoed_message }}"
          echo "The calculated message is: ${{ steps.run_script.outputs.result }} - This is a computed message." 
